name: CI - Build, Test, Inspection

on:
  push:
    branches: [ "main", "deployment", "CICD" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-inspect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Continuous Integration - Compile project
        run: mvn clean compile

      - name: Continuous Testing - Run unit tests
        run: mvn test

      - name: Continuous Inspection - Generate PMD Dashboard & Check
        run: mvn pmd:pmd pmd:check

      - name: Upload PMD Dashboard Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pmd-dashboard-report
          path: target/site/pmd.html

      - name: Package application
        run: mvn package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: manajemen-kontak-jar
          path: target/*.jar
